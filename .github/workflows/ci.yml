name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  go:
    name: Go — vet, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.24'}
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
