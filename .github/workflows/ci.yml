name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  go:
    name: Go — vet, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.24'}
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
      - name: nautilus check (examples)
        run: go run ./cmd/nautilus check examples
  sparkplug-tck:
    name: Sparkplug B — TCK edge-node conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.24'}
      # Drives an in-process edge node through its full lifecycle against the
      # joyautomation/sparkplug-tck-go edge-node profile (embeds its own
      # broker) and fails on any conformance assertion failure.
      - run: NAUTILUS_TCK=1 go test ./sparkplug/ -run TestTCKConformance -v -timeout 90s

  vscode-iec:
    name: VS Code extension — compile, test
    runs-on: ubuntu-latest
    defaults:
      run: {working-directory: tools/vscode-iec}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '22'}
      - run: npm ci
      - run: npm test
  release-config:
    name: Release config — goreleaser check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goreleaser/goreleaser-action@v6
        with: {version: '~> v2', args: check}
